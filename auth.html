<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Student Dashboard - Sign In/Up</title>
  <style>
    @import url('https://fonts.googleapis.com/css?family=Montserrat:400,800');

    * {
      box-sizing: border-box;
    }

    body {
      background: #f6f5f7;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      font-family: 'Montserrat', sans-serif;
      height: 100vh;
      margin: -20px 0 50px;
    }

    h1 {
      font-weight: bold;
      margin: 0;
    }

    p {
      font-size: 14px;
      font-weight: 100;
      line-height: 20px;
      letter-spacing: 0.5px;
      margin: 20px 0 30px;
    }

    button {
      border-radius: 20px;
      border: 1px solid #FF4B2B;
      background-color: #FF4B2B;
      color: #FFFFFF;
      font-size: 12px;
      font-weight: bold;
      padding: 12px 45px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: transform 80ms ease-in;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.95);
    }

    button:focus {
      outline: none;
    }

    button.ghost {
      background-color: transparent;
      border-color: #FFFFFF;
    }

    button.skip-btn {
      background-color: #6c757d;
      border-color: #6c757d;
      margin-top: 20px;
    }

    button.skip-btn:hover {
      background-color: #5a6268;
      border-color: #5a6268;
    }

    form {
      background-color: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 0 50px;
      height: 100%;
      text-align: center;
    }

    input {
      background-color: #eee;
      border: none;
      padding: 12px 15px;
      margin: 8px 0;
      width: 100%;
    }

    .container {
      background-color: #fff;
      border-radius: 10px;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.25), 0 10px 10px rgba(0, 0, 0, 0.22);
      position: relative;
      overflow: hidden;
      width: 768px;
      max-width: 100%;
      min-height: 480px;
    }

    .form-container {
      position: absolute;
      top: 0;
      height: 100%;
      transition: all 0.6s ease-in-out;
    }

    .sign-in-container {
      left: 0;
      width: 50%;
      z-index: 2;
    }

    .container.right-panel-active .sign-in-container {
      transform: translateX(100%);
    }

    .sign-up-container {
      left: 0;
      width: 50%;
      opacity: 0;
      z-index: 1;
    }

    .container.right-panel-active .sign-up-container {
      transform: translateX(100%);
      opacity: 1;
      z-index: 5;
      animation: show 0.6s;
    }

    @keyframes show {

      0%,
      49.99% {
        opacity: 0;
        z-index: 1;
      }

      50%,
      100% {
        opacity: 1;
        z-index: 5;
      }
    }

    .overlay-container {
      position: absolute;
      top: 0;
      left: 50%;
      width: 50%;
      height: 100%;
      overflow: hidden;
      transition: transform 0.6s ease-in-out;
      z-index: 100;
    }

    .container.right-panel-active .overlay-container {
      transform: translateX(-100%);
    }

    .overlay {
      background: #FF416C;
      background: -webkit-linear-gradient(to right, #FF4B2B, #FF416C);
      background: linear-gradient(to right, #FF4B2B, #FF416C);
      background-repeat: no-repeat;
      background-size: cover;
      background-position: 0 0;
      color: #FFFFFF;
      position: relative;
      left: -100%;
      height: 100%;
      width: 200%;
      transform: translateX(0);
      transition: transform 0.6s ease-in-out;
    }

    .container.right-panel-active .overlay {
      transform: translateX(50%);
    }

    .overlay-panel {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 0 40px;
      text-align: center;
      top: 0;
      height: 100%;
      width: 50%;
      transform: translateX(0);
      transition: transform 0.6s ease-in-out;
    }

    .overlay-left {
      transform: translateX(-20%);
    }

    .container.right-panel-active .overlay-left {
      transform: translateX(0);
    }

    .overlay-right {
      right: 0;
      transform: translateX(0);
    }

    .container.right-panel-active .overlay-right {
      transform: translateX(20%);
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      body {
        margin: 0;
        padding: 20px;
      }

      .container {
        width: 100%;
        min-height: auto;
        height: auto;
        flex-direction: column;
      }

      .form-container {
        position: static;
        width: 100%;
        height: auto;
        padding: 40px 20px;
      }

      .sign-in-container {
        order: 1;
      }

      .sign-up-container {
        order: 1;
        display: none;
      }

      .container.right-panel-active .sign-in-container {
        display: none;
      }

      .container.right-panel-active .sign-up-container {
        display: block;
        opacity: 1;
        transform: none;
      }

      .overlay-container {
        position: static;
        width: 100%;
        height: auto;
        transform: none;
        background: linear-gradient(to right, #FF4B2B, #FF416C);
        border-radius: 10px;
        margin-top: 20px;
        padding: 30px 20px;
        text-align: center;
      }

      .overlay {
        position: static;
        width: 100%;
        height: auto;
        transform: none;
        background: transparent;
        padding: 0;
      }

      .overlay-panel {
        position: static;
        width: 100%;
        transform: none;
        padding: 0;
        display: block !important;
      }

      .overlay-left {
        padding: 0;
        border-bottom: none;
        text-align: center;
      }

      .overlay-right {
        padding: 0;
        text-align: center;
      }

      .container:not(.right-panel-active) .overlay-left {
        display: none !important;
      }

      .container:not(.right-panel-active) .overlay-right {
        display: block !important;
      }

      .container.right-panel-active .overlay-left {
        display: block !important;
      }

      .container.right-panel-active .overlay-right {
        display: none !important;
      }

      .overlay-left h1 {
        font-size: 18px;
        margin-bottom: 10px;
      }

      .overlay-left p {
        font-size: 13px;
        margin: 10px 0 15px 0;
      }

      .overlay-right h1 {
        font-size: 18px;
        margin-bottom: 10px;
      }

      .overlay-right p {
        font-size: 13px;
        margin: 10px 0 15px 0;
      }

      .ghost {
        background: rgba(255, 255, 255, 0.2);
        border: 2px solid #FFFFFF;
        color: #FFFFFF;
        padding: 10px 25px;
        font-size: 12px;
        margin: 5px;
      }

      .ghost:hover {
        background: rgba(255, 255, 255, 0.3);
      }

      .container.right-panel-active .sign-in-container,
      .container.right-panel-active .sign-up-container,
      .container.right-panel-active .overlay-container,
      .container.right-panel-active .overlay {
        transform: none;
      }

      .container.right-panel-active .overlay-left,
      .container.right-panel-active .overlay-right {
        transform: none;
      }

      form {
        padding: 0 20px;
      }

      h1 {
        font-size: 24px;
        margin-bottom: 20px;
      }

      p {
        font-size: 14px;
        margin: 15px 0;
      }

      button {
        padding: 12px 30px;
        font-size: 14px;
      }

      input {
        padding: 12px 15px;
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="container" id="container">
    <div class="form-container sign-up-container">
      <form action="#">
        <h1>Create Account</h1>
        <input type="text" id="signup-name" placeholder="Name" />
        <input type="email" id="signup-email" placeholder="Email" />
        <input type="password" id="signup-password" placeholder="Password" />
        <button type="button" onclick="signup()">Sign Up</button>
      </form>
    </div>
    <div class="form-container sign-in-container">
      <form action="#">
        <h1>Sign in</h1>
        <input type="email" id="login-email" placeholder="Email" />
        <input type="password" id="login-password" placeholder="Password" />
        <button type="button" onclick="login()">Sign In</button>
        <button type="button" class="skip-btn" id="skipAuth">Skip Auth</button>
      </form>
    </div>
    <div class="overlay-container">
      <div class="overlay">
        <div class="overlay-panel overlay-left">
          <h1>Welcome Back!</h1>
          <p>To keep connected with us please login with your personal info</p>
          <button class="ghost" id="signIn">Sign In</button>
        </div>
        <div class="overlay-panel overlay-right">
          <h1>Hello, Friend!</h1>
          <p>Enter your personal details and start journey with us</p>
          <button class="ghost" id="signUp">Sign Up</button>
        </div>
      </div>
    </div>
  </div>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "YOUR_KEY",
      authDomain: "student-dashboard-2c69c.firebaseapp.com",
      projectId: "student-dashboard-2c69c",
      storageBucket: "student-dashboard-2c69c.appspot.com",
      messagingSenderId: "460268749441",
      appId: "1:460268749441:web:67baf73c70f34bd9130380"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.signup = async function () {
      const email = document.getElementById("signup-email").value;
      const password = document.getElementById("signup-password").value;

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        alert("Account created!");
        window.location.href = "index.html";
      } catch (error) {
        alert(error.message);
      }
    }

    window.login = async function () {
      const email = document.getElementById("login-email").value;
      const password = document.getElementById("login-password").value;

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        alert("Login successful!");
        window.location.href = "index.html";
      } catch (error) {
        alert(error.message);
      }
    }
  </script>
  <script>
    const signUpButton = document.getElementById('signUp');
    const signInButton = document.getElementById('signIn');
    const container = document.getElementById('container');
    const skipAuthButton = document.getElementById('skipAuth');

    signUpButton.addEventListener('click', () => {
      container.classList.add('right-panel-active');
    });

    signInButton.addEventListener('click', () => {
      container.classList.remove('right-panel-active');
    });

    skipAuthButton.addEventListener('click', () => {
      // Redirect to the main dashboard
      window.location.href = 'index.html';
    });

    // Remove form submission handlers since we're using onclick functions
  </script>
</body>

</html>
